spring.application.name=epcore

# ===============================
# MYSQL DATABASE
# ===============================

spring.datasource.url=jdbc:mysql://localhost:3306/epcore_db?useSSL=false&serverTimezone=America/Bogota&allowPublicKeyRetrieval=true

spring.datasource.username=epcore_user
spring.datasource.password=Epcore#2026!

spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ===============================
# JPA / HIBERNATE
# ===============================

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect

# ===============================
# THYMELEAF
# ===============================

spring.thymeleaf.cache=false

# ===============================
# SERVER
# ===============================

server.port=8080
spring.jpa.generate-ddl=true
spring.jpa.defer-datasource-initialization=true

logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.orm.jdbc.bind=TRACE